<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframe Builder</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Interact.js for Drag and Resize -->
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  
  <!-- html-to-image for PNG generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .canvas-bg {
      background-size: 20px 20px;
      background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
    }
    .draggable {
      touch-action: none;
      user-select: none;
      position: absolute;
    }
    .resize-handle {
      position: absolute;
      right: -5px;
      bottom: -5px;
      width: 15px;
      height: 15px;
      background: #3b82f6;
      border-radius: 50%;
      cursor: se-resize;
      display: none;
    }
    .draggable:hover .resize-handle {
      display: block;
    }
    .active-element {
      outline: 2px dashed #3b82f6;
    }
  </style>
</head>
<body class="bg-gray-50 h-screen flex overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm z-10">
    <div class="p-6 border-b border-gray-100">
      <h1 class="text-xl font-bold text-gray-800 tracking-tight">Wireframe UI</h1>
      <p class="text-xs text-gray-500 mt-1">Click to add to canvas</p>
    </div>
    
    <div class="p-4 flex flex-col gap-3 flex-1 overflow-y-auto">
      <button onclick="addElement('header')" class="w-full text-left p-3 border rounded hover:bg-gray-50 transition shadow-sm text-sm font-medium">Header / Navbar</button>
      <button onclick="addElement('hero')" class="w-full text-left p-3 border rounded hover:bg-gray-50 transition shadow-sm text-sm font-medium">Hero Image</button>
      <button onclick="addElement('text')" class="w-full text-left p-3 border rounded hover:bg-gray-50 transition shadow-sm text-sm font-medium">Text Block</button>
      <button onclick="addElement('card')" class="w-full text-left p-3 border rounded hover:bg-gray-50 transition shadow-sm text-sm font-medium">Card Element</button>
      <button onclick="addElement('button')" class="w-full text-left p-3 border rounded hover:bg-gray-50 transition shadow-sm text-sm font-medium">Action Button</button>
    </div>

    <div class="p-4 border-t border-gray-100 bg-gray-50 flex flex-col gap-2">
      <button id="copyBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded font-semibold text-sm shadow-md transition flex justify-center items-center gap-2">
        Copy as PNG
      </button>
      <button onclick="document.getElementById('canvas').innerHTML = ''" class="w-full bg-white border hover:bg-gray-100 text-gray-600 p-2 rounded font-medium text-sm transition">
        Clear Canvas
      </button>
    </div>
  </aside>

  <!-- Main Canvas Area -->
  <main class="flex-1 relative overflow-auto bg-gray-100 p-8 flex justify-center">
    <div id="canvas-container" class="relative w-full max-w-5xl h-full shadow-xl bg-white border border-gray-200 rounded-lg overflow-hidden flex flex-col">
      <!-- Toolbar for Mockup -->
      <div class="h-10 bg-gray-100 border-b flex items-center px-4 gap-2">
        <div class="w-3 h-3 rounded-full bg-red-400"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
        <div class="w-3 h-3 rounded-full bg-green-400"></div>
      </div>
      <!-- Actual Drawing Area -->
      <div id="canvas" class="flex-1 canvas-bg relative overflow-hidden">
        <!-- Elements injected here via JS -->
      </div>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('canvas');

    // Element Blueprints
    const blueprints = {
      header: `<div class="bg-gray-200 border-2 border-gray-300 w-full h-16 flex items-center px-4 justify-between rounded"><div class="w-24 h-6 bg-gray-300 rounded"></div><div class="flex gap-2"><div class="w-12 h-4 bg-gray-300 rounded"></div><div class="w-12 h-4 bg-gray-300 rounded"></div></div></div>`,
      hero: `<div class="bg-gray-200 border-2 border-gray-300 flex items-center justify-center rounded flex-col text-gray-400"><svg class="w-12 h-12 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><span>Image Placeholder</span></div>`,
      text: `<div class="flex flex-col gap-2 p-2"><div class="w-3/4 h-6 bg-gray-300 rounded"></div><div class="w-full h-4 bg-gray-200 rounded"></div><div class="w-full h-4 bg-gray-200 rounded"></div><div class="w-5/6 h-4 bg-gray-200 rounded"></div></div>`,
      card: `<div class="bg-white border-2 border-gray-300 shadow-sm rounded-lg p-4 flex flex-col gap-3"><div class="w-full h-32 bg-gray-200 rounded"></div><div class="w-2/3 h-5 bg-gray-300 rounded"></div><div class="w-full h-3 bg-gray-200 rounded"></div><div class="w-full h-3 bg-gray-200 rounded"></div></div>`,
      button: `<div class="bg-blue-500 rounded px-6 py-2 text-white font-medium flex items-center justify-center">Action</div>`
    };

    // Default sizes based on type
    const defaultSizes = {
      header: { w: 600, h: 64 },
      hero: { w: 600, h: 300 },
      text: { w: 400, h: 100 },
      card: { w: 250, h: 250 },
      button: { w: 120, h: 40 }
    };

    // Add Element to Canvas
    function addElement(type) {
      const el = document.createElement('div');
      el.className = 'draggable absolute';
      
      const size = defaultSizes[type];
      el.style.width = size.w + 'px';
      el.style.height = size.h + 'px';
      
      // Center it initially
      const cx = (canvas.offsetWidth / 2) - (size.w / 2);
      const cy = (canvas.offsetHeight / 2) - (size.h / 2);
      
      el.style.transform = \`translate(\${cx}px, \${cy}px)\`;
      el.setAttribute('data-x', cx);
      el.setAttribute('data-y', cy);
      
      // Add blueprint HTML
      el.innerHTML = blueprints[type];
      
      // Add resize handle
      const handle = document.createElement('div');
      handle.className = 'resize-handle';
      el.appendChild(handle);
      
      // Click to remove outline from others, add to this
      el.addEventListener('mousedown', () => {
        document.querySelectorAll('.draggable').forEach(d => d.classList.remove('active-element'));
        el.classList.add('active-element');
      });

      // Double click to delete
      el.addEventListener('dblclick', () => el.remove());

      canvas.appendChild(el);
    }

    // Initialize Interact.js for Drag and Drop
    interact('.draggable')
      .draggable({
        modifiers: [
          interact.modifiers.snap({
            targets: [interact.createSnapGrid({ x: 20, y: 20 })], // Snap to 20px grid
            range: Infinity,
            relativePoints: [ { x: 0, y: 0 } ]
          }),
          interact.modifiers.restrictRect({ restriction: 'parent', endOnly: true })
        ],
        listeners: {
          move(event) {
            const target = event.target;
            const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
            const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
            
            target.style.transform = \`translate(\${x}px, \${y}px)\`;
            target.setAttribute('data-x', x);
            target.setAttribute('data-y', y);
          }
        }
      })
      .resizable({
        edges: { right: '.resize-handle', bottom: '.resize-handle' },
        modifiers: [
          interact.modifiers.snapSize({ targets: [interact.createSnapGrid({ x: 20, y: 20 })] })
        ],
        listeners: {
          move: function (event) {
            let { x, y } = event.target.dataset;
            x = (parseFloat(x) || 0) + event.deltaRect.left;
            y = (parseFloat(y) || 0) + event.deltaRect.top;

            Object.assign(event.target.style, {
              width: \`\${event.rect.width}px\`,
              height: \`\${event.rect.height}px\`,
              transform: \`translate(\${x}px, \${y}px)\`
            });
            Object.assign(event.target.dataset, { x, y });
            
            // Adjust inner content size if necessary
            const innerDiv = event.target.firstElementChild;
            if (innerDiv) {
              innerDiv.style.width = '100%';
              innerDiv.style.height = '100%';
            }
          }
        }
      });

    // Deselect elements when clicking canvas background
    canvas.addEventListener('mousedown', (e) => {
      if(e.target === canvas) {
        document.querySelectorAll('.draggable').forEach(d => d.classList.remove('active-element'));
      }
    });

    // Copy to PNG Logic
    document.getElementById('copyBtn').addEventListener('click', async () => {
      const btn = document.getElementById('copyBtn');
      const originalText = btn.innerText;
      btn.innerText = "Copying...";
      
      // Remove outlines for the screenshot
      document.querySelectorAll('.draggable').forEach(d => d.classList.remove('active-element'));
      document.querySelectorAll('.resize-handle').forEach(h => h.style.display = 'none');
      
      const node = document.getElementById('canvas-container');
      
      try {
        const blob = await htmlToImage.toBlob(node, { 
          quality: 1, 
          backgroundColor: '#f3f4f6' 
        });
        
        const item = new ClipboardItem({ "image/png": blob });
        await navigator.clipboard.write([item]);
        
        btn.innerText = "Copied!";
        btn.classList.add('bg-green-600');
        setTimeout(() => {
          btn.innerText = originalText;
          btn.classList.remove('bg-green-600');
        }, 2000);
      } catch (err) {
        console.error("Copy failed", err);
        btn.innerText = "Error!";
        setTimeout(() => { btn.innerText = originalText; }, 2000);
      } finally {
        // Restore resize handles (handled by hover CSS normally, just removing inline style)
        document.querySelectorAll('.resize-handle').forEach(h => h.style.display = '');
      }
    });
  </script>
</body>
</html>
